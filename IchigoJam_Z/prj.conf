# UART
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=n
CONFIG_PRINTK=n
CONFIG_BOOT_BANNER=n

# GPIO
CONFIG_GPIO=y

# ADC (IN1/IN2/BTN analog input)
CONFIG_ADC=y

# PWM (sound)
CONFIG_PWM=y

# Flash / NVS storage
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# I2C
CONFIG_I2C=y

# Reboot support (used by IJB_reset via sys_reboot)
CONFIG_REBOOT=y

# Counter (used by CVBS video line timer on rpi_pico / frdm_mcxa153)
CONFIG_COUNTER=y

# Dynamic interrupts (MCXA153: override CTimer driver ISR to eliminate H-sync jitter)
CONFIG_DYNAMIC_INTERRUPTS=y

# SRAM vector table (MCXA153: enables direct ISR registration to bypass z_arm_isr_wrapper)
# z_arm_isr_wrapper is in Flash; cache miss (~50-100cy) causes per-line SYNC=L jitter.
# With SRAM vector table, video_on() overwrites CTimer1 entry to call _cvbs_direct_isr
# directly. IRQ latency becomes fixed 12cy (CM33 hw) + LDM stall (0-9cy) only.
CONFIG_SRAM_VECTOR_TABLE=y

# Zero-latency IRQs (MCXA153: CVBS ISR at NVIC priority 0, unpreemptable by kernel tick)
# Without this, OS timer (kernel tick, IRQ57) is at the same NVIC priority as CTimer1 (IRQ40).
# Same-priority ISRs tail-chain → CVBS delayed by OS timer execution → H-sync jitter.
# With this, regular IRQs shift to NVIC prio 2+; CVBS with IRQ_ZERO_LATENCY → NVIC prio 0.
# CVBS ISR must NOT call any Zephyr kernel APIs (already satisfied: direct register access only).
CONFIG_ZERO_LATENCY_IRQS=y

# Threads
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_MAIN_THREAD_PRIORITY=7
CONFIG_HEAP_MEM_POOL_SIZE=4096
